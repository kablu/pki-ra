# =============================================================================
# PKI-RA RAService — MariaDB Profile Configuration
# Active when: --spring.profiles.active=mariadb
#
# Purpose:
#   Connects raservice to a production MariaDB instance.
#   Enables Flyway so V1__create_app_config.sql runs automatically on startup.
#   Sets ddl-auto to validate — Hibernate checks schema but never modifies it.
#
# Required before starting with this profile:
#   1. MariaDB server running
#   2. Database created:
#        CREATE DATABASE pki_ra CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#   3. db.properties on classpath with correct JDBC URL, username, password
# =============================================================================

spring:
  autoconfigure:
    # Re-enable Flyway (excluded globally in application.yml for H2 profile)
    exclude: []

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  jpa:
    hibernate:
      # validate — Hibernate checks entity vs schema, never changes the table
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: false

logging:
  level:
    com.pki.ra: INFO
    org.flywaydb: INFO
