# =============================================================================
# PKI-RA RAService — Application Configuration
# =============================================================================
# No direct database connection — persistence is handled by :common module.
# =============================================================================

spring:
  application:
    name: pki-ra-raservice

  config:
    import: classpath:application-common.yml

  # Flyway excluded globally — raservice has no migration scripts.
  # DataSource + JPA exclusions removed: under h2 profile, DataSourceConfig
  # (common) creates the H2 bean and DatabaseConfig wires @EnableJpaAuditing.
  # application-h2.yml overrides any remaining exclusions for the h2 profile.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server:
  port: 8083
  servlet:
    context-path: /ra-api
  error:
    include-message: always
    include-binding-errors: always

# -----------------------------------------------------------------------------
# SpringDoc / Swagger UI
# -----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level:
    com.pki.ra: DEBUG
