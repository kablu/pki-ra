# =============================================================================
# raservice — IDE / Local run configuration
# =============================================================================
# Used when running RaServiceApplication directly from IntelliJ.
#
# Active profile  : ide
# Port            : 8083
# Context path    : /ra-api
#
# Shared properties are imported from common/config/.
# database.properties is intentionally excluded — raservice has no DB connection.
# =============================================================================

server.port=8083
spring.application.name=pki-ra-raservice
spring.profiles.active=ide

# -----------------------------------------------------------------------------
# Import shared config (path relative to this file's location)
# -----------------------------------------------------------------------------
spring.config.import=\
  ../../common/config/common.properties;\
  ../../common/config/logging.properties

# -----------------------------------------------------------------------------
# Disable DB auto-configuration — no DataSource needed
# -----------------------------------------------------------------------------
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# Override JPA settings imported from common.properties (no DB = no JPA)
spring.jpa.properties.hibernate.format_sql=false
spring.data.jpa.repositories.enabled=false

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server.servlet.context-path=/ra-api
server.error.include-message=always
server.error.include-binding-errors=always

# -----------------------------------------------------------------------------
# SpringDoc / Swagger UI
# -----------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
