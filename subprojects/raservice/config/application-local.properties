# =============================================================================
# raservice — Local / IDE run configuration
# Used when running directly from IntelliJ or CLI (not inside Docker/K8s).
# No database connection required for this service.
# =============================================================================

server.port=8083
spring.application.name=pki-ra-raservice
spring.profiles.active=local

# Import shared configs (relative path from this file's directory)
spring.config.import=\
  ../../common/config/common.properties;\
  ../../common/config/logging.properties

# --- Server ------------------------------------------------------------------
server.servlet.context-path=/ra-api
server.error.include-message=always
server.error.include-binding-errors=always

# --- SpringDoc / Swagger -----------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json
