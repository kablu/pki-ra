# =============================================================================
# db.properties — H2 In-Memory DataSource Configuration
# Profile : h2  (activate with --spring.profiles.active=h2)
# Purpose : Dev / test environment embedded database.
#           Production modules use MariaDB via database.properties.
# =============================================================================

# -----------------------------------------------------------------------------
# DataSource — H2 in-memory, MySQL compatibility mode
# DB_CLOSE_DELAY=-1   : keep DB alive as long as JVM runs
# DB_CLOSE_ON_EXIT=FALSE : do not auto-close on JVM exit (Hikari manages this)
# MODE=MySQL          : emulate MySQL/MariaDB SQL dialect
# NON_KEYWORDS=VALUE  : avoid conflict with SQL reserved word VALUE
# -----------------------------------------------------------------------------
db.datasource.url=jdbc:h2:mem:pki_ra;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
db.datasource.username=sa
db.datasource.password=
db.datasource.driver-class-name=org.h2.Driver

# -----------------------------------------------------------------------------
# Hikari Connection Pool
# Smaller pool than MariaDB — H2 is single-process, no network overhead
# -----------------------------------------------------------------------------
db.datasource.hikari.pool-name=PKI-RA-H2-Pool
db.datasource.hikari.maximum-pool-size=5
db.datasource.hikari.minimum-idle=1
db.datasource.hikari.connection-timeout=20000
db.datasource.hikari.idle-timeout=300000
db.datasource.hikari.max-lifetime=900000
db.datasource.hikari.auto-commit=true

# -----------------------------------------------------------------------------
# H2 Web Console (dev introspection — disabled in prod via profile)
# Access at : http://localhost:<port>/h2-console
# JDBC URL  : jdbc:h2:mem:pki_ra
# -----------------------------------------------------------------------------
db.h2.console.enabled=true
db.h2.console.path=/h2-console
db.h2.console.settings.web-allow-others=false
db.h2.console.settings.trace=false
