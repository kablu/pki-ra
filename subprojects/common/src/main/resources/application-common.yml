# =============================================================================
# Common module shared configuration
# Imported by all runnable subprojects via spring.config.import
#
# Profile strategy:
#   (default / prod) → MariaDB via database.properties in each runnable module
#   h2               → H2 in-memory via db.properties + application-h2.yml
# =============================================================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate          # Never auto-create schema — Flyway manages it
    show-sql: false
    open-in-view: false           # Prevent lazy-loading issues in REST controllers
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        generate_statistics: false

  data:
    jpa:
      repositories:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.pki.ra: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    com.zaxxer.hikari: WARN
