# =============================================================================
# common/config/database.properties
# Local / Docker database connection settings.
# Override sensitive values with environment variables in production.
# =============================================================================

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/pki_ra}
spring.datasource.username=${DB_USERNAME:pki_ra_user}
spring.datasource.password=${DB_PASSWORD:pki_ra_pass}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --- Flyway ------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
