# =============================================================================
# PKI-RA GUI — Application Configuration
# =============================================================================
# Sensitive values (AD password, DB password) must be set via:
#   Environment variables OR Kubernetes/Docker secrets — NEVER hardcode here.
# =============================================================================

spring:
  application:
    name: pki-ra-gui

  config:
    import: classpath:application-common.yml

  # ---------------------------------------------------------------------------
  # Database — PostgreSQL
  # ---------------------------------------------------------------------------
  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/pki_ra}
    username: ${DB_USERNAME:pki_ra_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ---------------------------------------------------------------------------
  # Flyway — DB migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---------------------------------------------------------------------------
  # Thymeleaf
  # ---------------------------------------------------------------------------
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # ---------------------------------------------------------------------------
  # Session
  # ---------------------------------------------------------------------------
  session:
    timeout: 30m

# -----------------------------------------------------------------------------
# PKI-RA Active Directory settings
# All values MUST be provided via environment variables in production
# -----------------------------------------------------------------------------
pki:
  ra:
    ad:
      domain:  ${AD_DOMAIN:corp.example.com}
      url:     ${AD_URL:ldap://ad.corp.example.com:389}
      root-dn: ${AD_ROOT_DN:dc=corp,dc=example,dc=com}

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server:
  port: 8080
  servlet:
    context-path: /pki-ra
  error:
    include-message: always
    include-binding-errors: always

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level:
    com.pki.ra: DEBUG
    org.springframework.security.ldap: DEBUG
