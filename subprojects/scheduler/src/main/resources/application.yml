# =============================================================================
# PKI-RA Scheduler — Application Configuration
# =============================================================================
spring:
  application:
    name: pki-ra-scheduler

  config:
    import: classpath:application-common.yml

  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/pki_ra}
    username: ${DB_USERNAME:pki_ra_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never      # Flyway manages QRTZ_* table creation

pki:
  ra:
    ad:
      domain:  ${AD_DOMAIN:corp.example.com}
      url:     ${AD_URL:ldap://ad.corp.example.com:389}
      root-dn: ${AD_ROOT_DN:dc=corp,dc=example,dc=com}
    scheduler:
      cert-expiry-cron:  "0 0 8 * * ?"     # Daily at 08:00 UTC
      crl-update-cron:   "0 0 */6 * * ?"   # Every 6 hours
      audit-archive-cron: "0 0 2 ? * SUN"  # Weekly on Sunday at 02:00 UTC

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.pki.ra: DEBUG
    org.quartz: INFO
