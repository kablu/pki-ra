# =============================================================================
# uiservice — Local / IDE run configuration
# Used when running directly from IntelliJ or CLI (not inside Docker/K8s).
# =============================================================================

server.port=8081
spring.application.name=pki-ra-uiservice
spring.profiles.active=local

# Import shared configs (relative path from this file's directory)
spring.config.import=\
  ../../common/config/common.properties;\
  ../../common/config/database.properties;\
  ../../common/config/logging.properties

# --- Datasource override (larger pool for API service) -----------------------
spring.datasource.hikari.maximum-pool-size=20

# --- Active Directory --------------------------------------------------------
pki.ra.ad.domain=${AD_DOMAIN:corp.example.com}
pki.ra.ad.url=${AD_URL:ldap://ad.corp.example.com:389}
pki.ra.ad.root-dn=${AD_ROOT_DN:dc=corp,dc=example,dc=com}

# --- Server ------------------------------------------------------------------
server.servlet.context-path=/api

# --- SpringDoc / Swagger -----------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json
