# =============================================================================
# PKI-RA UIService — Application Configuration
# =============================================================================

spring.application.name=pki-ra-uiservice

spring.config.import=classpath:application-common.properties

# =============================================================================
# DataSource — MariaDB
# =============================================================================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/pki_ra}
spring.datasource.username=${DB_USERNAME:pki_ra_user}
spring.datasource.password=${DB_PASSWORD:pki_ra_pass}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# =============================================================================
# HikariCP Connection Pool
# =============================================================================
spring.datasource.hikari.pool-name=PkiRaHikariPool
# Pool sizing
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
# Timeouts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
# Validation
spring.datasource.hikari.connection-test-query=SELECT 1
# MariaDB optimizations
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# =============================================================================
# Flyway — DB Migrations
# =============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =============================================================================
# Server
# =============================================================================
server.port=8081
server.servlet.context-path=/api

# =============================================================================
# SpringDoc / Swagger
# =============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# =============================================================================
# Custom PKI-RA Properties
# =============================================================================
pki.ra.ad.domain=${AD_DOMAIN:corp.example.com}
pki.ra.ad.url=${AD_URL:ldap://ad.corp.example.com:389}
pki.ra.ad.root-dn=${AD_ROOT_DN:dc=corp,dc=example,dc=com}

# =============================================================================
# Logging
# =============================================================================
logging.level.com.pki.ra=DEBUG
