# =============================================================================
# PKI-RA UIService — Application Configuration
# =============================================================================
spring:
  application:
    name: pki-ra-uiservice

  config:
    import: classpath:application-common.yml

  datasource:
    url:      ${DB_URL:jdbc:mariadb://localhost:3306/pki_ra}
    username: ${DB_USERNAME:pki_ra_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

pki:
  ra:
    ad:
      domain:  ${AD_DOMAIN:corp.example.com}
      url:     ${AD_URL:ldap://ad.corp.example.com:389}
      root-dn: ${AD_ROOT_DN:dc=corp,dc=example,dc=com}

server:
  port: 8081
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.pki.ra: DEBUG
