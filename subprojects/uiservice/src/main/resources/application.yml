# =============================================================================
# PKI-RA UIService — Application Configuration
# =============================================================================
spring:
  application:
    name: pki-ra-uiservice

  config:
    import: classpath:application-common.yml

  datasource:
    url:               ${DB_URL:jdbc:postgresql://localhost:5432/pki_ra}
    username:          ${DB_USERNAME:pki_ra_user}
    password:          ${DB_PASSWORD:pki_ra_pass}
    driver-class-name: org.postgresql.Driver

    # -----------------------------------------------------------------
    # HikariCP Connection Pool — production-ready settings
    # -----------------------------------------------------------------
    hikari:
      pool-name:           PkiRaHikariPool
      # Pool sizing
      maximum-pool-size:   20     # max concurrent DB connections
      minimum-idle:        5      # always-warm connections (idle pool)
      # Timeouts
      connection-timeout:  30000  # 30s — max wait for a free connection
      idle-timeout:        600000 # 10m — idle connection ko retire karo
      max-lifetime:        1800000 # 30m — force recycle (DB timeout se kam rakho)
      keepalive-time:      60000  # 1m  — idle ping (firewall drop prevent)
      # Validation
      connection-test-query: SELECT 1

  # -----------------------------------------------------------------------
  # JPA / Hibernate
  # -----------------------------------------------------------------------
  jpa:
    open-in-view: false                  # LazyLoading trap avoid karo
    show-sql:     false                  # production mein false
    hibernate:
      ddl-auto:   validate               # Flyway schema manage karega
    properties:
      hibernate:
        format_sql:                true
        jdbc:
          time_zone:               UTC   # DB mein always UTC timestamps
          batch_size:              50    # bulk insert/update fast
        order_inserts:             true
        order_updates:             true
        jdbc.batch_versioned_data: true
        generate_statistics:       false

  # -----------------------------------------------------------------------
  # Flyway — DB migrations
  # -----------------------------------------------------------------------
  flyway:
    enabled:             true
    locations:           classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

pki:
  ra:
    ad:
      domain:  ${AD_DOMAIN:corp.example.com}
      url:     ${AD_URL:ldap://ad.corp.example.com:389}
      root-dn: ${AD_ROOT_DN:dc=corp,dc=example,dc=com}

server:
  port: 8081
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.pki.ra: DEBUG
